<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MLB Pitch Predictor — MVP</title>
  <style>
    body { font-family: ui-monospace, Menlo, Consolas, monospace;
           max-width: 960px; margin: 1em auto; padding: 0 1em; }
    h2 { margin: 1.3em 0 0.3em; font-size: 1em; letter-spacing: 0.04em; }
    .bar { display: flex; gap: 0.6em; align-items: center; flex-wrap: wrap;
           margin-bottom: 0.8em; }
    select, button { font-family: inherit; padding: 4px 8px; }
    .stamp { color: #666; font-size: 0.9em; margin-left: auto; }
    pre { background: #f4f4f4; padding: 0.8em; overflow-x: auto;
          white-space: pre-wrap; word-break: break-word; margin: 0; }
    .err { color: #b00; }
  </style>
</head>
<body>
  <h1>MLB Pitch Predictor — MVP</h1>

  <div class="bar">
    <label for="gameSelect">Game:</label>
    <select id="gameSelect"></select>
    <button id="refreshBtn">Refresh now</button>
    <span class="stamp">Last updated: <span id="stamp">-</span></span>
  </div>

  <h2>[LIVE STATE]</h2>
  <pre id="liveState">waiting…</pre>

  <h2>[PREDICTIONS]</h2>
  <pre id="predictions">waiting…</pre>

  <h2>[ODDS]</h2>
  <pre id="odds">waiting…</pre>

  <h2>[EDGE ALERTS]</h2>
  <pre id="edge">waiting…</pre>

<script>
const API = "http://localhost:8000";
const REFRESH_MS = 15000;
const EDGE_THRESHOLD = 0.05;
const FALLBACK = [{ game_pk: 745431, label: "Fallback test game 745431" }];

async function jget(path) {
  const r = await fetch(`${API}${path}`);
  if (!r.ok) throw new Error(`${path} -> ${r.status}`);
  return r.json();
}

async function loadGames() {
  try {
    const games = await jget("/games");
    if (!games.length) return FALLBACK;
    return games.map(g => ({
      game_pk: g.game_pk,
      label: `${g.away_team} @ ${g.home_team} (${g.status})`,
    }));
  } catch (e) {
    console.warn("loadGames failed, using fallback", e);
    return FALLBACK;
  }
}

function selected() {
  return document.getElementById("gameSelect").value;
}

function setText(id, txt) { document.getElementById(id).textContent = txt; }
function setHTML(id, html) { document.getElementById(id).innerHTML = html; }

function renderEdge(rows) {
  if (!Array.isArray(rows) || !rows.length) return "(empty)";
  return rows.map(r => {
    const line = JSON.stringify(r);
    return (typeof r.edge === "number" && r.edge > EDGE_THRESHOLD)
      ? `<strong>${line}</strong>` : line;
  }).join("\n");
}

async function refresh() {
  const gamePk = selected();
  if (!gamePk) return;
  try {
    const [pred, odds, edge] = await Promise.all([
      jget(`/predictions/${gamePk}`),
      jget(`/odds/${gamePk}`),
      jget(`/edge/${gamePk}`),
    ]);
    console.log("predictions", pred);
    console.log("odds", odds);
    console.log("edge", edge);
    setText("liveState", JSON.stringify(pred.context || {}, null, 2));
    setText("predictions", (pred.predictions || [])
      .map(p => JSON.stringify(p)).join("\n"));
    setText("odds", (odds || []).map(o => JSON.stringify(o)).join("\n"));
    setHTML("edge", renderEdge(edge));
    setText("stamp", new Date().toLocaleTimeString());
  } catch (e) {
    console.error("refresh failed", e);
    setText("liveState", `error: ${e.message}`);
  }
}

async function init() {
  const games = await loadGames();
  const sel = document.getElementById("gameSelect");
  for (const g of games) {
    const opt = document.createElement("option");
    opt.value = g.game_pk;
    opt.textContent = `${g.game_pk} — ${g.label}`;
    sel.appendChild(opt);
  }
  sel.addEventListener("change", refresh);
  document.getElementById("refreshBtn").addEventListener("click", refresh);
  await refresh();
  setInterval(refresh, REFRESH_MS);
}

init();
</script>
</body>
</html>
